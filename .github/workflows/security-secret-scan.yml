# Secret detection via TruffleHog. Scans the diff on every PR + full
# history on scheduled runs. Blocks the PR when a verified secret is
# found (i.e. a credential that TruffleHog could actually authenticate
# with). Unverified matches are logged but non-blocking.
#
# SOC 2 evidence: CC7 vulnerability management, "no secrets in repo"
# invariant from the InfoSec policy.

name: security · secret scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '31 4 * * 1'

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # need history for diff-scan on PRs
      - name: trufflehog on diff (PR)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --results=verified,unknown
      - name: trufflehog on branch (push + schedule)
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified --only-verified
